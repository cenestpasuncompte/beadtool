<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>拼豆色号库存表</title>
<style>
  :root{
    --bg:#fff7ee; --card:#ffffff; --ink:#4a2a1d; --muted:#8a6a5a;
    --accent:#c55939; --accent2:#d18342; --line:#ead4c2; --ok:#2f8f5b; --bad:#c23b3b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--ink);
    padding-bottom:env(safe-area-inset-bottom,0);
  }
  .wrap{max-width:1060px;margin:0 auto;padding:22px 16px}
  h1{font-size:22px;margin:4px 0 8px;line-height:1.3}
  h2{font-size:18px;margin:0 0 12px}
  p{color:var(--muted);margin:0 0 18px;line-height:1.6;font-size:14px}
  .grid{display:grid;grid-template-columns:1fr;gap:14px}
  @media(min-width:900px){.grid{grid-template-columns:1fr 1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 8px 20px rgba(74,42,29,.06)}
  label{display:block;font-weight:650;margin:10px 0 6px;font-size:14px}
  input,textarea,button{font:inherit}
  input,textarea{
    width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;
    background:#fff;color:var(--ink);outline:none;
    font-size:16px;
    -webkit-appearance:none;
    transition:border-color .15s;
  }
  input:focus,textarea:focus{border-color:var(--accent)}
  input.error{border-color:var(--bad);animation:shake .3s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  textarea{min-height:100px;resize:vertical}
  button{
    border:0;border-radius:12px;padding:12px 16px;
    background:var(--accent);color:#fff;font-weight:700;cursor:pointer;
    margin:8px 8px 0 0;
    touch-action:manipulation;
    min-height:44px;
    -webkit-appearance:none;
    user-select:none;
    transition:opacity .1s;
  }
  button:active{opacity:.7}
  button.secondary{background:var(--accent2)}
  button.ghost{background:#f4e2d2;color:var(--ink)}
  button:disabled{opacity:.45;cursor:not-allowed}
  .row{display:flex;gap:8px;align-items:center}
  .row input{flex:1;min-width:0}
  .row button{white-space:nowrap;flex-shrink:0;margin:0}
  .btn-group{display:flex;flex-wrap:wrap;gap:0}

  /* ── inventory display ── */
  .inv-meta{display:flex;align-items:baseline;gap:10px;margin:10px 0 6px;flex-wrap:wrap}
  .inv-total{font-size:13px;color:var(--muted)}
  .prefix-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
  .prefix-badge{
    font-size:12px;font-weight:700;padding:3px 9px;border-radius:999px;
    background:#f4e2d2;color:var(--ink);white-space:nowrap;cursor:pointer;
    touch-action:manipulation;transition:background .1s;
  }
  .prefix-badge:active{background:var(--line)}
  .search-result{font-size:13px;min-height:18px;margin-top:5px}
  .search-result.ok{color:var(--ok)}
  .search-result.bad{color:var(--bad)}
  .groups{margin-top:8px;display:flex;flex-direction:column;gap:6px}
  .group{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fffaf5}
  .group summary{
    list-style:none;display:flex;align-items:center;gap:8px;
    padding:9px 13px;cursor:pointer;user-select:none;touch-action:manipulation;
    font-weight:700;
  }
  .group summary::-webkit-details-marker{display:none}
  .group-letter{font-size:15px;color:var(--accent);min-width:22px}
  .group-count{font-size:13px;color:var(--muted);font-weight:400}
  .group-chevron{margin-left:auto;font-size:11px;color:var(--muted);transition:transform .2s;line-height:1}
  details[open] .group-chevron{transform:rotate(180deg)}
  .inv-list{border-top:1px solid var(--line)}
  .inv-row{
    display:flex;align-items:center;gap:6px;
    padding:8px 12px;border-bottom:1px solid var(--line);background:#fff;
  }
  .inv-row:last-child{border-bottom:0}
  .inv-row.hl{background:#fff8e0}
  .inv-row.low{background:#fff5f5}
  .inv-code{font-weight:700;font-size:14px;min-width:40px}
  .inv-count{font-size:13px;color:var(--muted);flex:1}
  .inv-low{font-size:12px;color:var(--bad);flex-shrink:0}
  .inv-actions{display:flex;gap:2px;flex-shrink:0}
  .btn-icon{
    border:0;background:transparent;cursor:pointer;padding:4px 6px;
    border-radius:8px;font-size:13px;line-height:1;color:var(--muted);
    min-height:32px;display:flex;align-items:center;touch-action:manipulation;margin:0;
    transition:background .1s;
  }
  .btn-icon:hover{background:var(--line)}
  .btn-icon.del{color:var(--bad)}
  .mode-toggle{display:flex;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:8px 0 4px}
  .mode-toggle button{
    flex:1;border:0;border-radius:0;margin:0;background:#fff;color:var(--muted);
    font-weight:600;padding:10px 8px;min-height:40px;font-size:14px;
  }
  .mode-toggle button.active{background:var(--accent);color:#fff}
  .modal-calc{font-size:13px;color:var(--ok);font-weight:700;min-height:18px;margin-top:6px}
  .modal-err{font-size:13px;color:var(--bad);min-height:14px;margin-top:4px}
  .empty-inv{font-size:13px;color:var(--muted);padding:10px 0}

  /* ── result / misc ── */
  .result{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
  @media(min-width:650px){.result{grid-template-columns:1fr 1fr}}
  .box{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fffaf6}
  .box h3{margin:0 0 8px;font-size:16px}
  .ok{color:var(--ok)} .bad{color:var(--bad)}
  .list{line-height:2;word-break:break-word;font-size:14px}
  .missing-row{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin:3px 0;line-height:1.6}
  .pack-warn{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:700;white-space:nowrap}
  .pack-warn-high{background:#fde8e8;color:var(--bad)}
  .pack-warn-mid{background:#fff3e0;color:#b85c00}
  .pack-total{margin-top:8px;padding-top:6px;border-top:1px solid var(--line);font-size:13px;font-weight:700;color:var(--ink)}
  .hint{font-size:13px;color:var(--muted);line-height:1.6;margin-top:6px}
  .feedback{font-size:13px;line-height:1.6;margin-top:6px;min-height:18px;transition:opacity .2s}
  .feedback.ok{color:var(--ok)}
  .feedback.bad{color:var(--bad)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:14px}
  .storage-warn{background:#fff3cd;border:1px solid #ffd97d;border-radius:12px;padding:10px 14px;font-size:13px;color:#7a5c00;margin-bottom:14px;display:none}
  select{
    width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;
    background:#fff;color:var(--ink);outline:none;font-size:16px;cursor:pointer;
    transition:border-color .15s;
  }
  select:focus{border-color:var(--accent)}
  .sync-bar{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:12px 16px;margin-bottom:14px;display:flex;flex-wrap:wrap;
    align-items:center;gap:10px;
  }
  .sync-status{font-size:13px;display:flex;align-items:center;gap:5px;margin-left:auto}
  .sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .sync-dot.local  {background:#aaa}
  .sync-dot.ok     {background:var(--ok)}
  .sync-dot.syncing{background:var(--accent2);animation:pulse 1s infinite}
  .sync-dot.error  {background:var(--bad)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .sync-bar input{flex:1;min-width:160px;margin:0}
  .modal-overlay{
    position:fixed;inset:0;background:rgba(74,42,29,.35);
    display:flex;align-items:center;justify-content:center;
    z-index:1000;padding:20px;
  }
  .modal-overlay[hidden]{display:none}
  .modal{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:22px 20px;max-width:360px;width:100%;box-shadow:0 12px 32px rgba(74,42,29,.18);
  }
  .modal h3{margin:0 0 10px;font-size:16px}
  .modal p{margin:0 0 18px;font-size:14px;color:var(--muted);line-height:1.6}
  .modal-btns{display:flex;gap:8px;justify-content:flex-end}
  .modal-warn{font-size:13px;color:#7a5c00;background:#fff3cd;border:1px solid #ffd97d;
    border-radius:10px;padding:9px 12px;margin-top:10px;display:none;line-height:1.5}
</style>
</head>
<body>
<div id="addModal" class="modal-overlay" hidden>
  <div class="modal">
    <h3>添加库存</h3>
    <div>
      <label for="addCode">色号</label>
      <input id="addCode" placeholder="例如 H7 / A11"
             autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
      <div class="modal-err" id="addCodeErr"></div>
    </div>
    <label>添加方式</label>
    <div class="mode-toggle">
      <button type="button" id="modePacksBtn" class="active">按整包</button>
      <button type="button" id="modeLooseBtn">按颗粒数</button>
    </div>
    <div id="packsField">
      <label for="addPacks">包数（1包 = 1000粒）</label>
      <input id="addPacks" type="number" inputmode="numeric" min="0" step="1" placeholder="0" />
    </div>
    <div id="looseField" style="display:none">
      <label for="addLoose">粒数</label>
      <input id="addLoose" type="number" inputmode="numeric" min="0" step="1" placeholder="0" />
    </div>
    <div class="modal-calc" id="addCalc"></div>
    <div class="modal-btns" style="margin-top:16px">
      <button type="button" class="ghost" id="addCancelBtn">取消</button>
      <button type="button" id="addConfirmBtn">添加</button>
    </div>
  </div>
</div>

<div id="dupModal" class="modal-overlay" hidden>
  <div class="modal">
    <h3 id="dupTitle">色号已存在</h3>
    <p id="dupDesc"></p>
    <div class="modal-btns">
      <button type="button" class="ghost" id="dupCancelBtn">取消</button>
      <button type="button" class="secondary" id="dupAppendBtn">追加</button>
      <button type="button" id="dupReplaceBtn">覆盖</button>
    </div>
  </div>
</div>

<div id="editModal" class="modal-overlay" hidden>
  <div class="modal">
    <h3 id="editTitle">编辑色号</h3>
    <div>
      <label for="editPacks">包数（1包 = 1000粒）</label>
      <input id="editPacks" type="number" inputmode="numeric" min="0" step="1" placeholder="0" />
    </div>
    <div style="margin-top:8px">
      <label for="editLoose">散粒数</label>
      <input id="editLoose" type="number" inputmode="numeric" min="0" step="1" placeholder="0" />
    </div>
    <div class="modal-calc" id="editCalc"></div>
    <div class="modal-btns" style="margin-top:16px">
      <button type="button" class="ghost" id="editCancelBtn">取消</button>
      <button type="button" id="editSaveBtn">保存</button>
    </div>
  </div>
</div>

<div id="genKeyModal" class="modal-overlay" hidden>
  <div class="modal">
    <h3>生成新密钥</h3>
    <p>生成新密钥会创建一份新的云端库存。当前库存不会被删除，但你需要保存旧密钥才能继续访问原来的数据。确定要生成新密钥吗？</p>
    <div class="modal-btns">
      <button id="genKeyCancelBtn" class="ghost"   type="button">取消</button>
      <button id="genKeyConfirmBtn" class="secondary" type="button">确定生成</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="storage-warn" id="storageWarn">⚠ 无法访问本地存储，数据仅在当前页面有效，刷新后会丢失。</div>
  <h1>拼豆色号库存表</h1>

  <div class="sync-bar" id="syncBar">
    <input id="syncKeyInput" placeholder="同步密钥（UUID）…"
           autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
    <button id="genKeyBtn"     class="ghost"     type="button">生成新密钥</button>
    <button id="connectBtn"    class="secondary" type="button">连接</button>
    <button id="disconnectBtn" class="ghost"     type="button" style="display:none">断开</button>
    <div class="sync-status">
      <span class="sync-dot local" id="syncDot"></span>
      <span id="syncLabel">仅本地</span>
    </div>
    <div class="modal-warn" id="genKeyWarn">新密钥已生成。请立即保存，否则换设备后无法找回这份库存。</div>
  </div>

  <div class="grid">

    <!-- ── inventory card ── -->
    <section class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <h2 style="margin:0">我的色号库存</h2>
        <div style="display:flex;gap:6px;align-items:center">
          <button id="exportBtn" class="ghost" type="button" style="margin:0;padding:7px 12px;font-size:13px;min-height:36px">导出</button>
          <button id="clearBtn" class="ghost" type="button" style="margin:0;padding:7px 12px;font-size:13px;min-height:36px">清空</button>
          <button id="openAddBtn" type="button" style="margin:0;padding:7px 14px;font-size:14px;min-height:36px">＋ 添加库存</button>
        </div>
      </div>
      <input id="searchColor" placeholder="搜索色号，例如 H7…"
             autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
      <div class="search-result" id="searchResult"></div>
      <div class="inv-meta" style="margin-top:10px">
        <span class="inv-total" id="count"></span>
      </div>
      <div class="prefix-badges" id="prefixBadges"></div>
      <div class="groups" id="groups"></div>
    </section>

    <!-- ── check card ── -->
    <section class="card">
      <h2>检查图纸需求</h2>
      <label for="needList">粘贴图纸需要的色号</label>
      <textarea id="needList" class="mono" placeholder="例如：E1 E3 E11 E15 E16 E18 F7 F10 F11 F15 F19 F21 F25 H2 H7 M13"></textarea>
      <div class="btn-group">
        <button id="checkBtn" type="button">检查缺色</button>
        <button id="clearNeedBtn" class="ghost" type="button">清空需求</button>
      </div>

      <div class="result" id="result" style="display:none">
        <div class="box">
          <h3 class="ok">已有</h3>
          <div class="list" id="haveResult"></div>
        </div>
        <div class="box">
          <h3 class="bad">缺少</h3>
          <div class="list" id="missingResult"></div>
        </div>
      </div>
    </section>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const KEY      = "bead_color_inventory_v3";
const KEY_V2   = "bead_color_inventory_v2";
const PACK     = 200;
const INV_PACK = 1000;

// ── Supabase config — replace with your own project values ──
const SUPABASE_URL      = "https://auleicfnwwpwkmxjzkks.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1bGVpY2Zud3dwd2tteGp6a2tzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTM1MzMsImV4cCI6MjA5MjkyOTUzM30.EJDPMBeI8zepwrl7K6MPPoCVHp_lbWR3qr4jJhay-pg";
const SYNC_KEY_STORAGE  = "bead_sync_key_v1";

let supabaseClient = null;
let syncKey = null;

function packWarning(count) {
  if (count == null) return null;
  const packs = Math.ceil(count / PACK);
  if (count >= PACK) return { text: `需要超过1包（需${packs}包）`, cls: "pack-warn-high" };
  if (count >= 150)  return { text: "接近1包，建议补充",           cls: "pack-warn-mid"  };
  return null;
}

function storageSave(key, val) {
  try { localStorage.setItem(key, val); }
  catch(e) { document.getElementById("storageWarn").style.display = "block"; }
}
function storageLoad(key, fallback) {
  try { const v = localStorage.getItem(key); return v !== null ? v : fallback; }
  catch(e) { document.getElementById("storageWarn").style.display = "block"; return fallback; }
}

function migrate(raw) {
  if (!Array.isArray(raw)) return [];
  return raw.map(item => {
    if (typeof item === "string") {
      const code = normalize(item);
      return code ? { code, packs: 0, loose: 0, total: 0 } : null;
    }
    if (item && typeof item.code === "string") {
      const code = normalize(item.code);
      if (!code) return null;
      const packs = parseInt(item.packs) || 0;
      const loose = parseInt(item.loose) || 0;
      return { code, packs, loose, total: packs * INV_PACK + loose };
    }
    return null;
  }).filter(Boolean);
}

// One-time migration from v2 key
(function() {
  try {
    if (!localStorage.getItem(KEY)) {
      const old = localStorage.getItem(KEY_V2);
      if (old) localStorage.setItem(KEY, JSON.stringify(migrate(JSON.parse(old))));
    }
  } catch(e) {}
})();

let colors = migrate(JSON.parse(storageLoad(KEY, "[]")));

function normalize(s) {
  return String(s).trim().replace(/\s+/g, "").toUpperCase();
}
function correctCode(tok) {
  const t = tok.replace(/[\s\-]/g, "").toUpperCase();
  const m = t.match(/^([A-Z]{1,2})([A-Z0-9]{1,4})$/);
  if (!m) return null;
  let letters = m[1], rest = m[2];
  if (letters.length === 2 && (letters[1] === "L" || letters[1] === "I")) {
    rest = "1" + rest;
    letters = letters[0];
  }
  const fixedRest = rest.replace(/L/g, "1").replace(/I/g, "1").replace(/O/g, "0");
  const code = letters + fixedRest;
  return /^[A-Z]\d{1,3}$/.test(code) ? code : null;
}
// Extracts [{code, count}] from text. count is null when no parenthesised number follows.
// Ignores bare numbers not directly attached to a color code.
function parseCodesWithCounts(text) {
  const raw = String(text).toUpperCase().replace(/[|]/g, "I");
  const seen = new Set();
  const items = [];
  const correctedSet = new Set();

  // Pass 1: code immediately followed by (N) — the N is the bead count
  const pairRe = /\b([A-Z]{1,2}[\s\-]?[A-Z0-9]{1,4})\s*\((\d{1,5})\)/g;
  let m;
  while ((m = pairRe.exec(raw)) !== null) {
    const orig = m[1].replace(/[\s\-]/g, "");
    const code = correctCode(orig);
    if (!code || seen.has(code)) continue;
    seen.add(code);
    if (orig !== code) correctedSet.add(code);
    items.push({ code, count: parseInt(m[2], 10) });
  }

  // Pass 2: standalone codes not already captured above
  const candidates = raw.match(/\b[A-Z]{1,2}[\s\-]?[A-Z0-9]{1,4}\b/g) || [];
  candidates.forEach(tok => {
    const orig = tok.replace(/[\s\-]/g, "");
    const code = correctCode(orig);
    if (!code || seen.has(code)) return;
    seen.add(code);
    if (orig !== code) correctedSet.add(code);
    items.push({ code, count: null });
  });

  items.sort((a, b) => a.code.localeCompare(b.code, "zh-Hans-CN", {numeric: true}));

  const correctedCount = items.filter(i => correctedSet.has(i.code)).length;
  let warning = null;
  if (items.length > 0 && correctedCount > 0) {
    warning = correctedCount / items.length >= 0.3
      ? `⚠ 置信度偏低：${correctedCount}/${items.length} 个色号经 OCR 纠错，建议核查图片清晰度。`
      : `已自动纠正 ${correctedCount} 个 OCR 误读（L→1、I→1、O→0）。`;
  }
  return { items, warning };
}
function getPrefix(c) {
  return c.match(/^[A-Z]+/)?.[0] || "?";
}

// ── Modal state ──────────────────────────────────────────────────────────────
let addMode = "packs";
let pendingDup = null;
let editingCode = null;

function openAddModal() {
  addMode = "packs";
  document.getElementById("addCode").value = "";
  document.getElementById("addCodeErr").textContent = "";
  document.getElementById("addPacks").value = "";
  document.getElementById("addLoose").value = "";
  document.getElementById("addCalc").textContent = "";
  document.getElementById("packsField").style.display = "";
  document.getElementById("looseField").style.display = "none";
  document.getElementById("modePacksBtn").classList.add("active");
  document.getElementById("modeLooseBtn").classList.remove("active");
  document.getElementById("addModal").removeAttribute("hidden");
  setTimeout(() => document.getElementById("addCode").focus(), 50);
}
function closeAddModal() {
  document.getElementById("addModal").setAttribute("hidden", "");
}
function setAddMode(mode) {
  addMode = mode;
  document.getElementById("packsField").style.display = mode === "packs" ? "" : "none";
  document.getElementById("looseField").style.display = mode === "loose" ? "" : "none";
  document.getElementById("modePacksBtn").classList.toggle("active", mode === "packs");
  document.getElementById("modeLooseBtn").classList.toggle("active", mode === "loose");
  updateAddCalc();
}
function updateAddCalc() {
  const packs = parseInt(document.getElementById("addPacks").value) || 0;
  const loose = parseInt(document.getElementById("addLoose").value) || 0;
  const total = addMode === "packs" ? packs * INV_PACK : loose;
  document.getElementById("addCalc").textContent = total > 0 ? `将添加 ${total.toLocaleString()} 粒` : "";
}
function confirmAdd() {
  const code = normalize(document.getElementById("addCode").value);
  const errEl = document.getElementById("addCodeErr");
  if (!code) {
    errEl.textContent = "请输入色号。";
    document.getElementById("addCode").classList.add("error");
    setTimeout(() => document.getElementById("addCode").classList.remove("error"), 400);
    return;
  }
  errEl.textContent = "";
  const packs = addMode === "packs" ? (parseInt(document.getElementById("addPacks").value) || 0) : 0;
  const loose = addMode === "loose" ? (parseInt(document.getElementById("addLoose").value) || 0) : 0;
  const existing = colors.find(r => r.code === code);
  if (existing) {
    pendingDup = { code, addPacks: packs, addLoose: loose };
    closeAddModal();
    document.getElementById("dupTitle").textContent = `${code} 已在库存中`;
    document.getElementById("dupDesc").textContent =
      `目前有 ${existing.total.toLocaleString()} 粒。请选择处理方式。`;
    document.getElementById("dupModal").removeAttribute("hidden");
    return;
  }
  colors.push({ code, packs, loose, total: packs * INV_PACK + loose });
  save();
  closeAddModal();
}
function closeDupModal() {
  document.getElementById("dupModal").setAttribute("hidden", "");
  pendingDup = null;
}
function dupAppend() {
  if (!pendingDup) return;
  const idx = colors.findIndex(r => r.code === pendingDup.code);
  if (idx < 0) { closeDupModal(); return; }
  const ex = colors[idx];
  const newLoose = ex.loose + pendingDup.addLoose;
  const newPacks = ex.packs + pendingDup.addPacks + Math.floor(newLoose / INV_PACK);
  const finalLoose = newLoose % INV_PACK;
  colors[idx] = { code: ex.code, packs: newPacks, loose: finalLoose, total: newPacks * INV_PACK + finalLoose };
  save();
  closeDupModal();
}
function dupReplace() {
  if (!pendingDup) return;
  const idx = colors.findIndex(r => r.code === pendingDup.code);
  if (idx < 0) { closeDupModal(); return; }
  const { addPacks: packs, addLoose: loose } = pendingDup;
  colors[idx] = { code: pendingDup.code, packs, loose, total: packs * INV_PACK + loose };
  save();
  closeDupModal();
}
function openEditModal(code) {
  const r = colors.find(x => x.code === code);
  if (!r) return;
  editingCode = code;
  document.getElementById("editTitle").textContent = `编辑 ${code}`;
  document.getElementById("editPacks").value = r.packs;
  document.getElementById("editLoose").value = r.loose;
  updateEditCalc();
  document.getElementById("editModal").removeAttribute("hidden");
}
function closeEditModal() {
  document.getElementById("editModal").setAttribute("hidden", "");
  editingCode = null;
}
function updateEditCalc() {
  const packs = parseInt(document.getElementById("editPacks").value) || 0;
  const loose = parseInt(document.getElementById("editLoose").value) || 0;
  document.getElementById("editCalc").textContent = `合计：${(packs * INV_PACK + loose).toLocaleString()} 粒`;
}
function confirmEdit() {
  if (!editingCode) return;
  const idx = colors.findIndex(r => r.code === editingCode);
  if (idx < 0) { closeEditModal(); return; }
  const packs = parseInt(document.getElementById("editPacks").value) || 0;
  const loose = parseInt(document.getElementById("editLoose").value) || 0;
  colors[idx] = { code: editingCode, packs, loose, total: packs * INV_PACK + loose };
  save();
  closeEditModal();
}

function save() {
  const seen = new Map();
  colors.forEach(r => seen.set(r.code, r));
  colors = [...seen.values()].sort((a, b) => a.code.localeCompare(b.code, "zh-Hans-CN", {numeric: true}));
  storageSave(KEY, JSON.stringify(colors));
  render();
  cloudSave(colors);
}

function render() {
  const groups = {};
  colors.forEach(r => {
    const p = getPrefix(r.code);
    (groups[p] = groups[p] || []).push(r);
  });
  const prefixes = Object.keys(groups).sort();

  document.getElementById("count").textContent =
    colors.length ? `共 ${colors.length} 个色号` : "暂无色号";

  const badgesEl = document.getElementById("prefixBadges");
  badgesEl.innerHTML = "";
  prefixes.forEach(p => {
    const span = document.createElement("span");
    span.className = "prefix-badge";
    span.textContent = `${p} · ${groups[p].length}`;
    span.title = `跳转到 ${p} 组`;
    span.addEventListener("click", () => {
      const det = document.getElementById("group-" + p);
      if (det) { det.open = true; det.scrollIntoView({behavior:"smooth", block:"nearest"}); }
    });
    badgesEl.appendChild(span);
  });

  const groupsEl = document.getElementById("groups");
  const openState = {};
  groupsEl.querySelectorAll("details").forEach(d => { openState[d.id] = d.open; });
  groupsEl.innerHTML = "";

  if (!colors.length) {
    const empty = document.createElement("div");
    empty.className = "empty-inv";
    empty.textContent = "还没有色号，先添加几个吧。";
    groupsEl.appendChild(empty);
    return;
  }

  prefixes.forEach(p => {
    const det = document.createElement("details");
    det.className = "group";
    det.id = "group-" + p;
    const prevOpen = openState["group-" + p];
    det.open = prevOpen !== undefined ? prevOpen : prefixes.length <= 3;

    const sumEl = document.createElement("summary");
    const letter = document.createElement("span"); letter.className = "group-letter"; letter.textContent = p;
    const cnt = document.createElement("span"); cnt.className = "group-count"; cnt.textContent = `${groups[p].length} 个`;
    const chev = document.createElement("span"); chev.className = "group-chevron"; chev.textContent = "▼";
    sumEl.appendChild(letter); sumEl.appendChild(cnt); sumEl.appendChild(chev);

    const listDiv = document.createElement("div");
    listDiv.className = "inv-list";
    groups[p].forEach(r => {
      const low = r.total < 200;
      const row = document.createElement("div");
      row.className = "inv-row" + (low ? " low" : "");
      row.dataset.code = r.code;

      const codeEl = document.createElement("span"); codeEl.className = "inv-code"; codeEl.textContent = r.code;
      const countEl = document.createElement("span"); countEl.className = "inv-count"; countEl.textContent = `（${r.total.toLocaleString()}粒）`;
      const warnEl = document.createElement("span"); warnEl.className = "inv-low"; warnEl.textContent = low ? "⚠" : "";

      const actions = document.createElement("div"); actions.className = "inv-actions";
      const editBtn = document.createElement("button");
      editBtn.className = "btn-icon"; editBtn.type = "button"; editBtn.title = "编辑"; editBtn.textContent = "✎";
      editBtn.addEventListener("click", () => openEditModal(r.code));
      const delBtn = document.createElement("button");
      delBtn.className = "btn-icon del"; delBtn.type = "button"; delBtn.title = "删除"; delBtn.textContent = "×";
      delBtn.addEventListener("click", () => { colors = colors.filter(x => x.code !== r.code); save(); });
      actions.appendChild(editBtn); actions.appendChild(delBtn);

      row.appendChild(codeEl); row.appendChild(countEl); row.appendChild(warnEl); row.appendChild(actions);
      listDiv.appendChild(row);
    });

    det.appendChild(sumEl); det.appendChild(listDiv);
    groupsEl.appendChild(det);
  });

  const searchVal = normalize(document.getElementById("searchColor").value);
  if (searchVal) applyHighlight(searchVal);
}

function applyHighlight(val) {
  document.querySelectorAll(".inv-row").forEach(row => {
    row.classList.toggle("hl", row.dataset.code === val);
  });
}

function searchColor() {
  const val = normalize(document.getElementById("searchColor").value);
  const el = document.getElementById("searchResult");
  document.querySelectorAll(".inv-row").forEach(r => r.classList.remove("hl"));
  if (!val) { el.textContent = ""; el.className = "search-result"; return; }

  if (colors.some(r => r.code === val)) {
    el.textContent = `✓ 已有 ${val}`;
    el.className = "search-result ok";
    // expand and highlight
    const p = getPrefix(val);
    const det = document.getElementById("group-" + p);
    if (det) det.open = true;
    applyHighlight(val);
  } else {
    el.textContent = `✗ 没有 ${val}`;
    el.className = "search-result bad";
  }
}

function checkNeed() {
  const { items } = parseCodesWithCounts(document.getElementById("needList").value);
  if (!items.length) return;
  compare(items);
}
function compare(items) {
  const haveSet = new Set(colors.map(r => r.code));
  const have    = items.filter(x =>  haveSet.has(x.code));
  const missing = items.filter(x => !haveSet.has(x.code));
  const fmt = ({ code, count }) => count != null ? `${code} (${count})` : code;

  document.getElementById("result").style.display = "grid";
  document.getElementById("haveResult").textContent = have.length ? have.map(fmt).join("、") : "没有匹配到。";

  const missingEl = document.getElementById("missingResult");
  missingEl.innerHTML = "";

  if (!missing.length) {
    missingEl.textContent = "没有缺色，购物车暂时逃过一劫。";
    return;
  }

  let packSum = 0;
  let hasCount = false;

  missing.forEach(({ code, count }) => {
    const row = document.createElement("div");
    row.className = "missing-row";

    const label = document.createElement("span");
    label.textContent = count != null ? `${code} (${count})` : code;
    row.appendChild(label);

    if (count != null) {
      hasCount = true;
      packSum += Math.ceil(count / PACK);
      const w = packWarning(count);
      if (w) {
        const badge = document.createElement("span");
        badge.className = "pack-warn " + w.cls;
        badge.textContent = w.text;
        row.appendChild(badge);
      }
    }

    missingEl.appendChild(row);
  });

  if (hasCount) {
    const total = document.createElement("div");
    total.className = "pack-total";
    total.textContent = `合计约需 ${packSum} 包`;
    missingEl.appendChild(total);
  }
}
function exportList() {
  const blob = new Blob([colors.map(r => r.code).join("\n")], {type: "text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "拼豆色号库存.txt"; a.click();
  URL.revokeObjectURL(url);
}
function clearAll() {
  if (confirm("确定清空全部库存色号吗？")) { colors = []; save(); }
}

// ── Cloud sync ──────────────────────────────────────────────────────────────

function mergeInventories(local, cloud) {
  const map = new Map();
  local.forEach(r => map.set(r.code, r));
  cloud.forEach(r => {
    const existing = map.get(r.code);
    if (!existing || r.total > existing.total) map.set(r.code, r);
  });
  return [...map.values()].sort((a, b) => a.code.localeCompare(b.code, "zh-Hans-CN", {numeric: true}));
}

function setSyncStatus(state, msg) {
  const dot = document.getElementById("syncDot");
  const label = document.getElementById("syncLabel");
  dot.className = "sync-dot " + state;
  label.textContent = msg;
}

function setSyncConnectedUI(connected) {
  document.getElementById("connectBtn").style.display    = connected ? "none"  : "";
  document.getElementById("disconnectBtn").style.display = connected ? ""      : "none";
}

async function cloudLoad() {
  if (!syncKey || !supabaseClient) return;
  setSyncStatus("syncing", "同步中…");
  try {
    const { data, error } = await supabaseClient
      .from("bead_inventories")
      .select("colors")
      .eq("sync_key", syncKey)
      .maybeSingle();

    if (error) throw error;

    if (data) {
      const cloudRecords = migrate(Array.isArray(data.colors) ? data.colors : []);
      colors = mergeInventories(colors, cloudRecords);
      storageSave(KEY, JSON.stringify(colors));
      render();
      await cloudSave(colors);
    } else {
      await cloudSave(colors);
    }
  } catch(e) {
    setSyncStatus("error", "同步失败，将使用本地数据");
  }
}

async function cloudSave(colorArray) {
  if (!syncKey || !supabaseClient) return;
  setSyncStatus("syncing", "同步中…");
  try {
    const { error } = await supabaseClient
      .from("bead_inventories")
      .upsert({ sync_key: syncKey, colors: colorArray, updated_at: new Date().toISOString() });
    if (error) throw error;
    setSyncStatus("ok", "云端已连接 · 已同步");
  } catch(e) {
    setSyncStatus("error", "同步失败，数据已保存本地");
  }
}

async function connectCloud(key) {
  if (!key) return;
  syncKey = key;
  try { localStorage.setItem(SYNC_KEY_STORAGE, key); } catch(e) {}
  setSyncConnectedUI(true);
  await cloudLoad();
}

function disconnectCloud() {
  syncKey = null;
  try { localStorage.removeItem(SYNC_KEY_STORAGE); } catch(e) {}
  setSyncConnectedUI(false);
  setSyncStatus("local", "仅本地");
}

function initCloud() {
  if (SUPABASE_URL.includes("YOUR_PROJECT")) return; // placeholder not replaced yet
  try {
    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch(e) { return; }
  let saved = null;
  try { saved = localStorage.getItem(SYNC_KEY_STORAGE); } catch(e) {}
  if (saved) {
    document.getElementById("syncKeyInput").value = saved;
    connectCloud(saved);
  }
}

// ── Event listeners ──────────────────────────────────────────────────────────

// Add modal
document.getElementById("openAddBtn").addEventListener("click", openAddModal);
document.getElementById("addCancelBtn").addEventListener("click", closeAddModal);
document.getElementById("addConfirmBtn").addEventListener("click", confirmAdd);
document.getElementById("addModal").addEventListener("click", e => { if (e.target === e.currentTarget) closeAddModal(); });
document.getElementById("modePacksBtn").addEventListener("click", () => setAddMode("packs"));
document.getElementById("modeLooseBtn").addEventListener("click", () => setAddMode("loose"));
document.getElementById("addPacks").addEventListener("input", updateAddCalc);
document.getElementById("addLoose").addEventListener("input", updateAddCalc);
document.getElementById("addCode").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); document.getElementById("addPacks").focus(); } });
document.getElementById("addPacks").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); confirmAdd(); } });
document.getElementById("addLoose").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); confirmAdd(); } });

// Duplicate modal
document.getElementById("dupCancelBtn").addEventListener("click", closeDupModal);
document.getElementById("dupAppendBtn").addEventListener("click", dupAppend);
document.getElementById("dupReplaceBtn").addEventListener("click", dupReplace);
document.getElementById("dupModal").addEventListener("click", e => { if (e.target === e.currentTarget) closeDupModal(); });

// Edit modal
document.getElementById("editCancelBtn").addEventListener("click", closeEditModal);
document.getElementById("editSaveBtn").addEventListener("click", confirmEdit);
document.getElementById("editModal").addEventListener("click", e => { if (e.target === e.currentTarget) closeEditModal(); });
document.getElementById("editPacks").addEventListener("input", updateEditCalc);
document.getElementById("editLoose").addEventListener("input", updateEditCalc);

// Inventory card
document.getElementById("exportBtn").addEventListener("click", exportList);
document.getElementById("clearBtn").addEventListener("click", clearAll);
document.getElementById("searchColor").addEventListener("input", searchColor);

// Check card
document.getElementById("checkBtn").addEventListener("click", checkNeed);
document.getElementById("clearNeedBtn").addEventListener("click", () => { document.getElementById("needList").value = ""; });

// Sync bar
document.getElementById("genKeyBtn").addEventListener("click", () => {
  document.getElementById("genKeyWarn").style.display = "none";
  document.getElementById("genKeyModal").removeAttribute("hidden");
});
document.getElementById("genKeyCancelBtn").addEventListener("click", () => {
  document.getElementById("genKeyModal").setAttribute("hidden", "");
});
document.getElementById("genKeyConfirmBtn").addEventListener("click", () => {
  document.getElementById("genKeyModal").setAttribute("hidden", "");
  document.getElementById("syncKeyInput").value = crypto.randomUUID();
  const warn = document.getElementById("genKeyWarn");
  warn.style.display = "block";
  setTimeout(() => { warn.style.display = "none"; }, 8000);
});
document.getElementById("genKeyModal").addEventListener("click", e => {
  if (e.target === e.currentTarget) e.currentTarget.setAttribute("hidden", "");
});
document.getElementById("connectBtn").addEventListener("click", () => {
  connectCloud(document.getElementById("syncKeyInput").value.trim());
});
document.getElementById("disconnectBtn").addEventListener("click", disconnectCloud);

render();
initCloud();
</script>
